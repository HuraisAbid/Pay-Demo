<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Cars Showroom</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>🚗 Super Car Showroom</h1>
        <p>Explore the finest Cars in the world!</p>
        <nav>
            <a href="#cars">Cars</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main>
        <section id="cars" class="cars-container">
            <div class="car-card">
                <img src="images/ferrari.png" alt="Ferrari F8">
                <h2>Lightning McQueen</h2>
                <p>Top Speed: 340 km/h</p>
                <button>View Details</button>
            </div>
            <div class="car-card">
                <img src="images/lamborghini.png" alt="Lamborghini Aventador">
                <h2>Mater</h2>
                <p>Top Speed: 350 km/h</p>
                <button>View Details</button>
            </div>
            <div class="car-card">
                <img src="images/porsche.png" alt="Porsche 911">
                <h2>Sally</h2>
                <p>Top Speed: 320 km/h</p>
                <button>View Details</button>
            </div>
        </section>

        <section id="contact" class="contact-section">
            <h2>Contact Us</h2>
            <p>Email: showroom@example.com | Phone: +123 456 7890</p>
            <form>
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Super Cars Showroom. All rights reserved.</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
